    const partners = ["Binance","Polygon","Chainlink","AWS","Google Cloud","Solana"];

    /* ========== COMPONENTS ========== */
    function Particles() {
      const particles = Array.from({length:20}, (_,i) => {
        const size = Math.random()*4+2;
        const left = Math.random()*100;
        const dur = Math.random()*15+10;
        const delay = Math.random()*10;
        return React.createElement('div',{key:i,className:'particle',
          style:{width:size,height:size,left:left+'%',animationDuration:dur+'s',animationDelay:delay+'s'}});
      });
      return React.createElement('div',{className:'particles'},particles);
    }

    function Navbar({lang,setLang}) {
      const t = T[lang];
      const [scrolled,setScrolled] = useState(false);
      useEffect(()=>{
        const h=()=>setScrolled(window.scrollY>50);
        window.addEventListener('scroll',h);
        return ()=>window.removeEventListener('scroll',h);
      },[]);
      return (
        <nav className={scrolled?'scrolled':''}>
          <div className="logo">ZETASUM</div>
          <ul className="nav-links">
            {t.nav.map((item,i)=><li key={i}><a href={'#section-'+i}>{item}</a></li>)}
          </ul>
          <div className="nav-right">
            <select className="lang-select" value={lang} onChange={e=>setLang(e.target.value)}>
              <option value="ko">KR 한국어</option>
              <option value="en">EN English</option>
              <option value="zh">CN 中文</option>
            </select>
          </div>
        </nav>
      );
    }

          <p>{t.heroDesc}</p>
          <div className="hero-buttons">
            <button className="btn-glow" onClick={onOpen}>{t.startBtn}</button>
            <button className="btn-outline" onClick={()=>document.getElementById('section-0')?.scrollIntoView({behavior:'smooth'})}>{t.learnBtn}</button>
          </div>
          <div className="scroll-indicator"><span>{t.scrollText}</span><div className="line"></div></div>
        </div>
      );
    }

          ))}

          <div className="cards">
            {t.cards.map((c,i)=>(
              <div className="card reveal" key={i}>
                <div className="card-icon">{c.icon}</div>
                <h3>{c.title}</h3>
                <p>{c.desc}</p>
              </div>
            ))}
          </div>
        </section>
      );
    }

            <h2 className="section-title">{t.roadmapTitle}</h2>
            <p className="section-desc">{t.roadmapDesc}</p>

    function Footer({lang}) {
      const t = T[lang];
      return (
        <footer id="section-3">
          <div className="footer-grid">
            <div className="footer-brand">
              <div className="logo">ZETASUM</div>
              <p>{t.footerDesc}</p>
            </div>
            {t.footerCols.map((col,i)=>(

                <h4>{col.title}</h4>

              </div>
            ))}
          </div>
          <div className="footer-bottom">{t.copyright}</div>
        </footer>
      );

    function Modal({lang,isOpen,onClose}) {
      if(!isOpen) return null;
      const t = T[lang];
      const [form,setForm] = useState({name:'',email:'',password:'',confirmPassword:''});
      const set = e => setForm({...form,[e.target.name]:e.target.value});

      const signup = () => {
        const {name,email,password,confirmPassword}=form;
        if(!name||!email||!password||!confirmPassword){alert(t.enterInfo);return;}
        if(password!==confirmPassword){alert(t.pwdMismatch);return;}
        if(!/^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{7,16}$/.test(password)){alert(t.pwdInvalid);return;}
        alert(t.signupOk);onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e=>e.stopPropagation()}>
            <span className="close-icon" onClick={onClose}>&times;</span>
            <h2>{t.signupTitle}</h2>
            <div className="input-group"><input name="name" placeholder={t.namePh} value={form.name} onChange={set}/></div>
            <div className="input-group"><input name="email" type="email" placeholder={t.emailPh} value={form.email} onChange={set}/></div>
            <div className="input-group"><input name="password" type="password" placeholder={t.pwdPh} value={form.password} onChange={set}/></div>
            <div className="input-group"><input name="confirmPassword" type="password" placeholder={t.confirmPh} value={form.confirmPassword} onChange={set}/></div>
            <p id="password-guide">{t.pwdGuide}</p>
            <button className="btn-block btn-primary" onClick={signup}>{t.signupBtn}</button>
            <button className="btn-block btn-secondary" onClick={()=>{alert(t.guestOk);onClose();}}>{t.guestBtn}</button>
          </div>
        </div>
      );
    }

    /* ========== APP ========== */
    function App() {
      const [lang,setLang] = useState("ko");
      const [modal,setModal] = useState(false);

      // Scroll reveal observer
      useEffect(()=>{
        const obs = new IntersectionObserver((entries)=>{
          entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});
        },{threshold:0.1});
        document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
        return ()=>obs.disconnect();
      });

      return (
        <div className="app-container">
          <div className="ambient-bg"></div>
          <Particles/>
          <Navbar lang={lang} setLang={setLang}/>
          <Hero lang={lang} onOpen={()=>setModal(true)}/>
          <Stats lang={lang}/>
          <Features lang={lang}/>
          <Roadmap lang={lang}/>
          <Partners lang={lang}/>
          <Footer lang={lang}/>
          <Modal lang={lang} isOpen={modal} onClose={()=>setModal(false)}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
